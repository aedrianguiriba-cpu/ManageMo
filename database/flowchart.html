<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManageMo - System Flowchart</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    header{background:#1e293b;border-bottom:1px solid #334155;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:1.2rem;font-weight:600;color:#f1f5f9}
    header span{font-size:.82rem;color:#94a3b8}
    .toolbar{padding:10px 24px;background:#1e293b;border-bottom:1px solid #334155;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .toolbar button{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:.82rem}
    .toolbar button:hover{background:#475569}
    .legend{padding:8px 24px;background:#1e293b;border-bottom:1px solid #334155;display:flex;gap:14px;flex-wrap:wrap;font-size:.78rem;color:#94a3b8}
    .leg{display:flex;align-items:center;gap:5px}
    .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
    #wrap{overflow:auto;padding:32px;min-height:calc(100vh - 120px);cursor:grab}
    #wrap:active{cursor:grabbing}
    #cnt{transform-origin:top left;transition:transform .1s}
    .mermaid svg{max-width:none!important;background:#1e293b;border-radius:10px;padding:20px;box-shadow:0 4px 32px rgba(0,0,0,.5)}
    #err{display:none;background:#7f1d1d;color:#fca5a5;padding:16px 24px;margin:24px;border-radius:8px;font-size:.88rem;white-space:pre-wrap}
  </style>
</head>
<body>
<header>
  <h1>ManageMo - System Flowchart</h1>
  <span>Pampanga State University - Inventory and Asset Management System</span>
</header>
<div class="toolbar">
  <span style="font-size:.82rem;color:#94a3b8">Zoom:</span>
  <button onclick="zoom(.25)">+ Zoom In</button>
  <button onclick="zoom(-.25)">- Zoom Out</button>
  <button onclick="resetZoom()">1:1 Reset</button>
  <button onclick="window.print()">Print / Save PDF</button>
  <button onclick="downloadSVG()" style="margin-left:auto">Download SVG</button>
  <button onclick="downloadPNG()">Download PNG</button>
</div>
<div class="legend">
  <span style="font-weight:600;color:#e2e8f0;margin-right:4px">Legend:</span>
  <div class="leg"><span class="dot" style="background:#1e3a5f;border:1px solid #0f2341"></span>Dashboard</div>
  <div class="leg"><span class="dot" style="background:#ffc107"></span>Pending</div>
  <div class="leg"><span class="dot" style="background:#20c997"></span>Approved</div>
  <div class="leg"><span class="dot" style="background:#dc3545"></span>Disapproved / Overdue</div>
  <div class="leg"><span class="dot" style="background:#0dcaf0"></span>Active Borrow</div>
  <div class="leg"><span class="dot" style="background:#198754"></span>Returned / Delivered</div>
  <div class="leg"><span class="dot" style="background:#6f42c1"></span>Planned (Mobile App)</div>
</div>
<div id="wrap"><div id="cnt"><div class="mermaid" id="chart"></div></div></div>
<div id="err"></div>
<script>
mermaid.initialize({startOnLoad:false,theme:'dark',flowchart:{curve:'basis',padding:20,useMaxWidth:false},securityLevel:'loose'});
fetch('./flowchart.mmd')
  .then(r=>r.text())
  .then(src=>{
    mermaid.render('mermaid-out',src)
      .then(({svg})=>{ document.getElementById('chart').innerHTML=svg; })
      .catch(e=>{ showErr('Mermaid parse error:\n'+e.message); });
  })
  .catch(e=>showErr('Could not load flowchart.mmd:\n'+e.message+'\nMake sure you are serving this file via a web server (e.g. http://localhost/ManageMo/database/flowchart.html).'));

function showErr(msg){ var el=document.getElementById('err'); el.style.display='block'; el.textContent=msg; }

var scale=1;
function zoom(d){ scale=Math.max(.2,Math.min(3,scale+d)); document.getElementById('cnt').style.transform='scale('+scale+')'; }
function resetZoom(){ scale=1; document.getElementById('cnt').style.transform='scale(1)'; }

function getSVGEl(){ return document.querySelector('#chart svg'); }

function downloadSVG(){
  var svg=getSVGEl(); if(!svg){alert('Chart not ready yet.');return;}
  var clone=svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.style.background='#1e293b';
  var blob=new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='managemo-flowchart.svg'; a.click(); URL.revokeObjectURL(a.href);
}

function downloadPNG(){
  var svg=getSVGEl(); if(!svg){alert('Chart not ready yet.');return;}
  var scale=3; // 3x for high-res
  var w=svg.getBoundingClientRect().width, h=svg.getBoundingClientRect().height;
  var clone=svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('width',w); clone.setAttribute('height',h);
  clone.style.background='#1e293b';
  // embed background rect
  var bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('width','100%'); bg.setAttribute('height','100%'); bg.setAttribute('fill','#1e293b');
  clone.insertBefore(bg,clone.firstChild);
  var svgStr=new XMLSerializer().serializeToString(clone);
  var blob=new Blob([svgStr],{type:'image/svg+xml'});
  var url=URL.createObjectURL(blob);
  var img=new Image();
  img.onload=function(){
    var canvas=document.createElement('canvas');
    canvas.width=w*scale; canvas.height=h*scale;
    var ctx=canvas.getContext('2d');
    ctx.scale(scale,scale);
    ctx.fillStyle='#1e293b'; ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    var a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='managemo-flowchart.png'; a.click();
  };
  img.onerror=function(){ URL.revokeObjectURL(url); alert('PNG export failed. Try Download SVG instead.'); };
  img.src=url;
}

var wrap=document.getElementById('wrap'),dragging=false,sx,sy,sl,st;
wrap.addEventListener('mousedown',e=>{ dragging=true; sx=e.pageX-wrap.offsetLeft; sy=e.pageY-wrap.offsetTop; sl=wrap.scrollLeft; st=wrap.scrollTop; });
wrap.addEventListener('mouseleave',()=>dragging=false);
wrap.addEventListener('mouseup',()=>dragging=false);
wrap.addEventListener('mousemove',e=>{ if(!dragging)return; e.preventDefault(); wrap.scrollLeft=sl-(e.pageX-wrap.offsetLeft-sx); wrap.scrollTop=st-(e.pageY-wrap.offsetTop-sy); });
</script>
</body>
</html>
